services:
  web-api:
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "8080:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Developement
    networks:
      - proxy-net
    
networks:
  proxy-net:
    name: proxy-net
    labels:
      "traefik.enable=true"
      'traefik.http.routers.fortune.rule=Host(`fortune.home`)'
      "traefik.http.services.fortune.loadbalancer.server.port=8081"

